<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Registro de Reportes</title>
  <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css'>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
<!-- partial:index.partial.html -->
<div class="container-fluid form-body">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="form-holder">
                    <div class="form-content">
                        <div class="form-items">
                            <h3>Registro de Reportes GEI</h3>
                            <p>Formulario de Registro de Reportes</p>
                            <form class="requires-validation" novalidate>

                                
                                <div class="col-md-12">
                                    <input class="form-select" type="date" name="Fecha" placeholder="Fecha" required>
                                    <div class="valid-feedback"></div>
                                    <div class="invalid-feedback">¿En qué fecha ocurrió el reporte?</div>
                                </div>
                                
                                <div class="col-md-12">
                                    <select class="form-select mt-3" required>
                                        <option selected disabled value="">Sucursal</option>
                                        <option value="Acarigua">Acarigua</option>
                                        <option value="Barquisimeto">Barquisimeto</option>
                                        <option value="Cagua">Cagua</option>
                                        <option value="Charallave">Charallave</option>
                                        <option value="Ciudad Bolívar">Ciudad Bolívar</option>
                                        <option value="El Paraíso">El Paraíso</option>
                                        <option value="Guarenas">Guarenas</option>
                                        <option value="Guatire">Guatire</option>
                                        <option value="Humbolt">Humbolt</option>
                                        <option value="IPSFA">IPSFA</option>
                                        <option value="La California">La California</option>
                                        <option value="La Cascada">La Cascada</option>
                                        <option value="La Hoyada">La Hoyada</option>
                                        <option value="La Isabelica">La Isabelica</option>
                                        <option value="La Piramide">La Piramide</option>
                                        <option value="La Urbina">La Urbina</option>
                                        <option value="Mañongo">Mañongo</option>
                                        <option value="Maracay">Maracay</option>
                                        <option value="Maturín Centro">Maturín Centro</option>
                                        <option value="Monagas Plaza">Monagas Plaza</option>
                                        <option value="Plaza Venezuela">Plaza Venezuela</option>
                                        <option value="San Bernardino">San Bernardino</option>
                                        <option value="San Martín">San Martín</option>
                                        <option value="Santa Cecília">Santa Cecília</option>
                                </select>
                                    <div class="valid-feedback"></div>
                                    <div class="invalid-feedback">Seleccione una sucursal</div>
                            </div>

                            <div class="col-md-12">
                                <select class="form-select mt-3" id="classification" required>
                                    <option selected disabled value="">Clasificación</option>
                                    <option value="Refrigeración">Energía</option>
                                    <option value="Refrigeración">Refrigeración</option>
                                    <option value="Climatización">Climatización</option>
                                    <option value="Laboratorio">Laboratorio</option>
                                    <option value="Lavandería">Lavandería</option>
                                    <option value="Carga y Transporte">Carga y Transporte</option>
                                </select>
                                    <div class="valid-feedback"></div>
                                    <div class="invalid-feedback">Debe clasificar su reporte</div>
                            </div>

                            <div class="col-md-12">
                                <select class="form-select mt-3" id="equipment" required>
                                  <option selected disabled value="">Equipo</option>
                                </select>
                                <div class="valid-feedback"></div>
                                <div class="invalid-feedback">Seleccione un equipo</div>
                            </div>


                            <div class="col-md-12">
                                <input class="form-control" type="text" name="Reporte" placeholder="Reporte" required>
                                <div class="valid-feedback"></div>
                                <div class="invalid-feedback">¿Cuál es el Reporte?</div>
                            </div>

                            <div class="col-md-12">
                                    <select class="form-select mt-3" required>
                                        <option selected disabled value="">Falla o Motivo de Visita</option>
                                        <option value="Falso Reporte">Falso Reporte</option>
                                        <option value="Operación">Operación</option>
                                        <option value="Mecánica">Mecánica</option>
                                        <option value="Eléctrica">Eléctrica</option>
                                        <option value="Control">Control</option>
                                        <option value="Mantenimiento">Mantenimiento</option>
                                        <option value="Preventivo">Preventivo</option>
                                </select>
                                    <div class="valid-feedback"></div>
                                    <div class="invalid-feedback">Seleccione un motivo de visita</div>
                            </div>


                            <div class="col-md-12 mt-3">
                                <label class="mb-3 mr-1" for="Coordinador">Coordinador: </label>

                                <input type="radio" class="btn-check" name="Coordinador" id="Cesar" autocomplete="off" required>
                                <label class="btn btn-sm btn-outline-secondary" for="Cesar">Cesar</label>

                                <input type="radio" class="btn-check" name="Coordinador" id="Edicson" autocomplete="off" required>
                                <label class="btn btn-sm btn-outline-secondary" for="Edicson">Edicson</label>

                                <input type="radio" class="btn-check" name="Coordinador" id="Iriana" autocomplete="off" required>
                                <label class="btn btn-sm btn-outline-secondary" for="Iriana">Iriana</label>

                                <input type="radio" class="btn-check" name="Coordinador" id="Leander" autocomplete="off" required>
                                <label class="btn btn-sm btn-outline-secondary" for="Leander">Leander</label>
                                <div class="valid-feedback mv-up"></div>
                                    <div class="invalid-feedback mv-up">Seleccione un coordinador</div>
                                </div>

                            <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="" id="invalidCheck">
                            <label class="form-check-label">Caso Cerrado</label>
                            </div>
                    

                                <div class="form-button mt-3">
                                    <button id="submit" type="submit" class="btn btn-primary">Registrar</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
<!-- partial -->
  <script  src="./script.js"></script>

</body>
</html>
