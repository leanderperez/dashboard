{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Registro de Reportes</title>
  <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css'>
  <link rel="stylesheet" href="{% static 'app/style.css' %}">
</head>
<body>
<div class="container-fluid form-body">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="form-holder">
                <div class="form-content">
                    <div class="form-items">
                        <h3>Registro de Reportes GEI</h3>
                        <p>Formulario de Registro de Reportes</p>
                        <form class="requires-validation" novalidate method="post">
                            {% csrf_token %}
                            {{ form.as_p }}
                            <div class="form-button mt-3">
                                <button id="submit" type="submit" class="btn btn-primary">Enviar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.6.0/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/js/bootstrap.min.js"></script>
<script src="{% static 'app/script.js' %}"></script>
</body>
</html>
